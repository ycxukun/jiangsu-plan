/* V1.1.4 compact display mode */
body.compact-mode{--shadow:0 8px 22px rgba(11,42,26,.06)}
body.compact-mode .hero{padding:10px 18px 6px}
body.compact-mode .brand h1{font-size:18px}
body.compact-mode .brand p{font-size:12px;margin-top:4px;line-height:1.35}
body.compact-mode .version{padding:6px 10px;font-size:11px}
body.compact-mode .header-toggle{height:30px;padding:0 10px;font-size:11px}
body.compact-mode .filters{grid-template-columns:repeat(8,minmax(96px,1fr));gap:7px;padding:7px 18px 10px}
body.compact-mode .filters select,
body.compact-mode .filters input,
body.compact-mode .filters button{height:32px;border-radius:10px;padding:0 10px;font-size:13px}
body.compact-mode .layout{grid-template-columns:270px 1fr;gap:12px;padding:12px 18px}
body.compact-mode .sidebar{top:126px;height:calc(100vh - 146px);border-radius:18px}
body.compact-mode.header-collapsed .sidebar{top:64px;height:calc(100vh - 82px)}
body.compact-mode .side-head{padding:12px 14px}
body.compact-mode .school-list{padding:6px}
body.compact-mode .school-item{padding:9px 10px;border-radius:13px;margin-bottom:4px}
body.compact-mode .school-item .name{font-size:13px}
body.compact-mode .school-item .meta{margin-top:5px;font-size:11px;gap:6px}
body.compact-mode .score-pill{margin-top:6px;padding:3px 7px;font-size:11px}
body.compact-mode .school-header{border-radius:20px;padding:16px 18px;margin-bottom:10px}
body.compact-mode .school-title h2{font-size:23px}
body.compact-mode .badges{gap:6px;margin-top:10px}
body.compact-mode .badge{padding:4px 8px;font-size:11px}
body.compact-mode .summary-grid{gap:8px;margin-top:12px}
body.compact-mode .metric{border-radius:14px;padding:10px 12px}
body.compact-mode .metric b{font-size:19px}
body.compact-mode .metric span{font-size:11px;margin-top:3px}
body.compact-mode .group-cards{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;margin-bottom:10px}
body.compact-mode .group-card{border-radius:16px;padding:10px}
body.compact-mode .group-card h3{font-size:13px;margin-bottom:7px}
body.compact-mode .group-card .grid{gap:6px}
body.compact-mode .mini{border-radius:10px;padding:6px}
body.compact-mode .mini span{font-size:10px}
body.compact-mode .tag-row{gap:5px;margin-top:7px}
body.compact-mode .tag{font-size:10px;padding:3px 6px}
body.compact-mode .group-section{border-radius:18px;margin-bottom:10px}
body.compact-mode .group-head{padding:11px 14px}
body.compact-mode .group-head h3{font-size:16px}
body.compact-mode .group-head p{font-size:12px;margin-top:5px}
body.compact-mode th,
body.compact-mode td{padding:7px 9px;font-size:12px}
body.compact-mode th{font-size:11px}
body.compact-mode table{min-width:860px}
body.compact-mode .risk-label,
body.compact-mode .note-badge{font-size:10px;padding:3px 6px}
body.compact-mode .panel{width:min(500px,90vw)}
body.compact-mode .panel-head{padding:14px 18px}
body.compact-mode .panel-body{padding:14px 18px}
body.compact-mode .class-grid{gap:6px}
body.compact-mode .class-chip{padding:6px 9px;font-size:12px}
body.compact-mode .modal{border-radius:20px}
body.compact-mode .modal h3{padding:14px 18px}
body.compact-mode .modal-body{padding:14px 18px}
@media(max-width:1100px){
  body.compact-mode .filters{grid-template-columns:repeat(3,1fr)}
  body.compact-mode .filters input{grid-column:span 3}
  body.compact-mode .layout{grid-template-columns:1fr}
}


/* V1.1.5 back-to-top */
.back-top{position:fixed;right:26px;bottom:26px;z-index:58;border:1px solid #cfe6d8;background:#fff;color:var(--green);border-radius:999px;padding:10px 14px;font-weight:900;box-shadow:0 12px 32px rgba(11,42,26,.12)}
.back-top:hover{background:#f0faf4;border-color:#9fd8b7}
body.compact-mode .back-top{right:18px;bottom:18px;padding:8px 12px;font-size:12px}


/* V1.1.6 requirement filter */
body.compact-mode .filters{grid-template-columns:repeat(9,minmax(88px,1fr))}
@media(max-width:1280px){
  body.compact-mode .filters{grid-template-columns:repeat(5,1fr)}
  body.compact-mode .filters input{grid-column:span 2}
}

/* Group quality borders */
.group-card.group-quality-red,.group-section.group-quality-red{border-color:#ef4444}
.group-card.group-quality-yellow,.group-section.group-quality-yellow{border-color:#f59e0b}
.group-card.group-quality-green,.group-section.group-quality-green{border-color:#22c55e}
.group-card.group-quality-red{box-shadow:0 0 0 1px rgba(239,68,68,.14),0 8px 26px rgba(11,42,26,.05)}
.group-card.group-quality-yellow{box-shadow:0 0 0 1px rgba(245,158,11,.16),0 8px 26px rgba(11,42,26,.05)}
.group-card.group-quality-green{box-shadow:0 0 0 1px rgba(34,197,94,.12),0 8px 26px rgba(11,42,26,.05)}
.group-section.group-quality-red{box-shadow:inset 4px 0 0 #ef4444,0 8px 26px rgba(11,42,26,.05)}
.group-section.group-quality-yellow{box-shadow:inset 4px 0 0 #f59e0b,0 8px 26px rgba(11,42,26,.05)}
.group-section.group-quality-green{box-shadow:inset 4px 0 0 #22c55e,0 8px 26px rgba(11,42,26,.05)}
.group-name-label{display:inline-block;margin-left:6px;color:var(--muted);font-size:.9em;font-weight:800}
.group-quality-badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;border:1px solid transparent}
.group-quality-badge.red{background:#fff0ee;color:#b42318;border-color:#ffd1cc}
.group-quality-badge.yellow{background:#fffbeb;color:#92400e;border-color:#fcd34d}
.group-quality-badge.green{background:#f0fbf4;color:#0a7c42;border-color:#b7dfc6}
body.compact-mode .group-name-label{display:block;margin-left:0;margin-top:2px}
body.compact-mode .group-quality-badge{padding:3px 7px;font-size:10px}

/* V1.1.8 volunteer form */
.volunteer-toggle{border-color:#b7dfc6;background:#f0faf4;color:var(--green)}
.volunteer-add-btn{border:1px solid #b7dfc6;background:#f0faf4;color:var(--green);border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900}
.volunteer-add-btn.selected{background:#e7f3ff;border-color:#bfdbfe;color:#1d4ed8}
.volunteer-add-btn:disabled{color:#7b8a82;border-color:var(--line);background:#f8faf9;cursor:not-allowed}
.volunteer-panel{width:min(840px,96vw)}
.volunteer-toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.volunteer-toolbar button,.volunteer-actions button,.major-picker-actions button{border:1px solid var(--line);border-radius:10px;background:#fff;padding:7px 10px;font-size:12px;font-weight:800;color:#24352b}
.volunteer-toolbar .save{background:var(--green);border-color:var(--green);color:#fff}
.volunteer-list{display:grid;gap:10px}
.volunteer-item{border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px}

.volunteer-title-wrap{display:flex;align-items:center;gap:8px;min-width:0}
.volunteer-position-input{width:44px;height:28px;border:1px solid #b7dfc6;border-radius:999px;background:#f0faf4;color:var(--green);font-size:13px;font-weight:900;text-align:center;outline:none}
.volunteer-position-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(10,124,66,.12);background:#fff}
.volunteer-drag-handle{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font-weight:900;cursor:grab;user-select:none}
.volunteer-drag-handle:active{cursor:grabbing}
.volunteer-item.dragging{opacity:.55}
.volunteer-item.drag-over{border-color:#86d19f;background:#f7fffa}
.volunteer-item.drop-before{box-shadow:0 -3px 0 var(--green)}
.volunteer-item.drop-after{box-shadow:0 3px 0 var(--green)}
.volunteer-item-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.volunteer-item-head b{font-size:15px}
.volunteer-item-head p{margin:5px 0 0;color:var(--muted);font-size:12px;line-height:1.5}
.volunteer-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.volunteer-actions button:disabled{opacity:.45;cursor:not-allowed}
.volunteer-meta-row{display:grid;grid-template-columns:110px 130px 1fr;gap:8px;margin-top:10px}
.volunteer-meta-row label{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;font-weight:800}
.volunteer-meta-row select,.volunteer-meta-row input{height:32px;border:1px solid var(--line);border-radius:10px;background:#fff;padding:0 8px;min-width:0}
.volunteer-meta-row input{width:100%}
.major-picker{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.major-picker summary{cursor:pointer;font-weight:900;color:#24352b}
.major-picker-actions{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.major-picker-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.major-check{display:block;border:1px solid var(--line);border-radius:12px;padding:8px;background:#fbfdfc;font-size:12px;line-height:1.45}
.major-check input{margin-right:6px}
.major-check span{color:var(--red);font-weight:900;margin-left:4px}
.major-check small{display:block;color:var(--muted);margin-top:3px;padding-left:20px}
.major-check.risk{background:#fff7f6;border-color:#ffd1cc}

.major-select-cell{width:82px;text-align:center;vertical-align:middle}
.major-select-box{display:inline-flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;font-weight:900;color:var(--muted)}
.major-order-badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:999px;background:var(--green);color:#fff;font-size:12px;font-weight:900;line-height:1}
.major-order-placeholder{display:inline-block;min-width:20px;height:20px;border-radius:999px;background:transparent;color:transparent;font-size:12px;font-weight:900;line-height:1}
.major-selected-row{background:#f0fff5}
.major-check.selected{background:#f0fff5;border-color:#9fd8b3}
.selected-major-list{display:grid;gap:6px;margin:8px 0 10px}
.selected-major-item{display:grid;grid-template-columns:28px minmax(130px,1fr) minmax(120px,auto) auto auto auto;align-items:center;gap:6px;border:1px solid #b7dfc6;background:#f7fffa;border-radius:12px;padding:7px 8px;font-size:12px}
.selected-major-item b{font-size:13px;color:#1f3327}
.selected-major-item small{color:var(--muted)}
