<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>江苏省招生计划变化知识库｜严格班型属性核对版</title>
<style>
:root{
  --bg:#f6f7f8; --panel:#fff; --text:#111827; --muted:#667085; --line:#d9dde3; --line2:#eef0f3;
  --green:#0a7c42; --red:#b42318; --orange:#b54708; --blue:#175cd3; --purple:#6941c6; --gray:#475467;
  --soft-red:#fff1f0; --soft-orange:#fff7ed; --soft-green:#f0fdf4; --soft-blue:#eff6ff;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}
button,input,select{font:inherit}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
.top-inner{padding:12px 18px;display:grid;grid-template-columns:280px 1fr;gap:14px;align-items:center}
.brand{font-weight:800;font-size:17px;letter-spacing:.02em}
.brand small{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}
.filters{display:grid;grid-template-columns:repeat(12,minmax(96px,1fr));gap:8px}
.filters input,.filters select{height:36px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px;color:var(--text)}
.toggles{grid-column:1/-1;display:flex;gap:8px;flex-wrap:wrap}
.toggle{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 10px;color:#344054;cursor:pointer}
.toggle.active{border-color:#0a7c42;background:#eefbf3;color:#075e33;font-weight:700}
.layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:16px;max-width:1920px;margin:0 auto;padding:16px}
.sidebar{position:sticky;top:98px;height:calc(100vh - 116px);overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px}
.side-head{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:800}
.school-list{padding:6px}
.school-item{width:100%;text-align:left;border:0;background:#fff;border-bottom:1px solid var(--line2);padding:10px 9px;border-radius:8px;cursor:pointer}
.school-item:hover,.school-item.active{background:#f2f7f4}
.school-name{font-weight:800;margin-bottom:2px}
.school-meta{font-size:12px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap}
.badge-mini{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:1px 6px;background:#fff}
.main{min-width:0}
.home,.school-view{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
.h1{font-size:22px;font-weight:900;margin:0 0 6px}
.note{color:var(--muted);margin:0 0 14px}
.kpis{display:grid;grid-template-columns:repeat(8,minmax(100px,1fr));gap:8px;margin:14px 0}
.kpi{border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff}
.kpi b{display:block;font-size:20px}
.kpi span{font-size:12px;color:var(--muted)}
.path{border:1px solid var(--line);border-radius:10px;padding:12px;background:#fbfcfd;margin-top:14px}
.school-header{border-bottom:2px solid #111827;padding-bottom:12px;margin-bottom:14px;display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
.school-title{font-size:24px;font-weight:900}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{height:34px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 12px;cursor:pointer}
.btn.primary{background:#111827;color:#fff;border-color:#111827}
.summary-line{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:3px 8px;font-size:12px;color:#344054}
.pill.red{border-color:#fecdca;background:#fff1f0;color:#b42318;font-weight:700}
.pill.green{border-color:#bbf7d0;background:#f0fdf4;color:#067647;font-weight:700}
.pill.orange{border-color:#fed7aa;background:#fff7ed;color:#b54708;font-weight:700}
.pill.blue{border-color:#bfdbfe;background:#eff6ff;color:#175cd3;font-weight:700}
.group-nav{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin:12px 0 18px}
.group-tile{border:1px solid var(--line);border-left:6px solid #667085;background:#fff;border-radius:10px;padding:10px;cursor:pointer;min-height:98px}
.group-tile:hover{box-shadow:0 4px 16px rgba(16,24,40,.08)}
.group-tile.info,.group-card.info{border-left-color:#175cd3}
.group-tile.eng,.group-card.eng{border-left-color:#e46b10}
.group-tile.science,.group-card.science{border-left-color:#0891b2}
.group-tile.med,.group-card.med{border-left-color:#d92d20}
.group-tile.bio,.group-card.bio{border-left-color:#16a34a}
.group-tile.human,.group-card.human{border-left-color:#7e22ce}
.group-tile.mix,.group-card.mix{border-left-color:#667085}
.tile-top{display:flex;justify-content:space-between;gap:6px;align-items:center}
.group-code{font-weight:900;font-size:18px}
.group-name{font-weight:800;margin:3px 0 6px}
.tile-metrics{font-size:12px;color:var(--muted);display:grid;grid-template-columns:1fr 1fr;gap:2px 8px}
.tile-metrics.compact{display:flex;flex-wrap:wrap;gap:4px 10px;font-size:12px}
.compact-head{padding-bottom:8px}
.compact-line{display:flex;flex-wrap:wrap;gap:6px 14px;color:var(--muted);font-size:13px;padding:6px 0 0}
.compact-line span{white-space:nowrap}
.special-only{margin-top:6px}
.group-card{margin-bottom:18px}
.table-wrap table th,.table-wrap table td{padding-top:7px;padding-bottom:7px}
.tile-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;max-width:120px}
.tile-tag{font-size:12px;border:1px solid #fed7aa;background:#fff7ed;color:#b54708;border-radius:999px;padding:1px 6px;white-space:nowrap}
.risk-high{color:#b42318;font-weight:800}
.risk-check{color:#b54708;font-weight:800}
.group-card{background:#fff;border:1px solid var(--line);border-left:8px solid #667085;border-radius:12px;margin:0 0 24px;overflow:hidden}
.group-card.high{box-shadow:none}
.group-card.legacy{opacity:.92}
.group-head{padding:14px 16px;border-bottom:1px solid var(--line);background:#fbfcfd}
.group-head-main{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.group-title{font-size:19px;font-weight:900}
.group-sub{color:var(--muted);font-size:12px;margin-top:3px}
.metric-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:8px;padding:12px 16px;border-bottom:1px solid var(--line)}
.metric{border:1px solid var(--line2);border-radius:8px;padding:8px;background:#fff}
.metric b{display:block;font-size:16px}
.metric span{font-size:12px;color:var(--muted)}
.risk-box{margin:12px 16px;border-radius:10px;padding:10px 12px;background:#f8fafc;border:1px solid var(--line);color:#344054}
.risk-box.high{background:#fff1f0;border-color:#fecdca;color:#912018}
.risk-box.check{background:#fff7ed;border-color:#fed7aa;color:#93370d}
.table-wrap{overflow:auto;padding:0 16px 16px}
table{border-collapse:collapse;width:100%;min-width:1120px;background:#fff}
th{text-align:left;font-size:12px;color:#475467;border-bottom:1px solid var(--line);padding:8px;white-space:nowrap;background:#fff}
td{border-bottom:1px solid var(--line2);padding:8px;vertical-align:top}
tr.risk-row{background:#fff1f0}
.major-name{font-weight:700}
.risk-row .major-name{color:#b42318;font-weight:900}
.icon{display:inline-flex;width:24px;height:24px;margin-right:6px;vertical-align:middle;align-items:center;justify-content:center}
.icon svg{width:22px;height:22px;stroke:#667085;stroke-width:1.7;fill:none}
.tags{display:flex;gap:4px;flex-wrap:wrap;max-width:210px}
.tag{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:1px 6px;background:#fff;white-space:nowrap}
.tag.bad{border-color:#fecdca;background:#fff1f0;color:#b42318;font-weight:800}

/* 专业组亲疏关系：五级组色 + 专业行黄/红标注 */
.group-tile.risk-excellent,.group-card.risk-excellent{border-left-color:#067647!important}
.group-tile.risk-good,.group-card.risk-good{border-left-color:#16a34a!important}
.group-tile.risk-yellow,.group-card.risk-yellow{border-left-color:#d97706!important}
.group-tile.risk-orange,.group-card.risk-orange{border-left-color:#f97316!important}
.group-tile.risk-red,.group-card.risk-red{border-left-color:#d92d20!important}
.group-card.risk-excellent .group-head{background:#ecfdf3}
.group-card.risk-good .group-head{background:#f0fdf4}
.group-card.risk-yellow .group-head{background:#fff7ed}
.group-card.risk-orange .group-head{background:#fff4e6}
.group-card.risk-red .group-head{background:#fff1f0}
.risk-mini{font-size:12px;border-radius:999px;padding:1px 7px;border:1px solid var(--line);white-space:nowrap;font-weight:800}
.risk-mini.risk-excellent,.pill.risk-excellent{border-color:#75e0a7;background:#ecfdf3;color:#05603a;font-weight:900}
.risk-mini.risk-good,.pill.risk-good{border-color:#bbf7d0;background:#f0fdf4;color:#067647;font-weight:800}
.risk-mini.risk-yellow,.pill.risk-yellow{border-color:#fed7aa;background:#fff7ed;color:#b54708;font-weight:800}
.risk-mini.risk-orange,.pill.risk-orange{border-color:#fdba74;background:#fff4e6;color:#c2410c;font-weight:900}
.risk-mini.risk-red,.pill.risk-red{border-color:#fecdca;background:#fff1f0;color:#b42318;font-weight:900}
tr.major-warn{background:#fff7ed}
tr.major-danger{background:#fff1f0}
.major-warn .major-name{color:#b54708;font-weight:800}
.major-danger .major-name{color:#b42318;font-weight:900}
.tag.warn{border-color:#fed7aa;background:#fff7ed;color:#b54708;font-weight:800}
.tag.danger{border-color:#fecdca;background:#fff1f0;color:#b42318;font-weight:900}
.legend-line{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.delta-pos{color:#067647;font-weight:800} .delta-neg{color:#b42318;font-weight:800}
.empty{padding:24px;text-align:center;color:var(--muted)}
.legacy-list{margin:8px 16px 16px;border:1px dashed #fed7aa;background:#fff7ed;border-radius:10px;padding:10px}
.legacy-list b{color:#93370d}
.modal{position:fixed;inset:0;background:rgba(17,24,39,.46);z-index:50;display:none;align-items:center;justify-content:center;padding:24px}
.modal.open{display:flex}
.modal-card{background:#fff;border-radius:14px;max-width:980px;width:100%;max-height:88vh;overflow:auto;border:1px solid var(--line)}
.modal-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:14px 18px;display:flex;justify-content:space-between;gap:10px;align-items:center}
.modal-title{font-weight:900;font-size:18px}
.modal-body{padding:16px 18px}
.evo-grid{display:grid;grid-template-columns:1fr 120px 1fr;gap:12px;align-items:start}
.evo-col{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
.evo-col h3{margin:0;padding:10px 12px;background:#f8fafc;border-bottom:1px solid var(--line);font-size:14px}
.evo-item{padding:8px 10px;border-bottom:1px solid var(--line2);font-size:13px}
.evo-mid{display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;min-height:180px;color:#475467}
.evo-arrow{border:1px solid var(--line);border-radius:999px;padding:5px 10px;background:#fff}
.backtop{position:fixed;right:22px;bottom:22px;width:42px;height:42px;border-radius:999px;border:1px solid var(--line);background:#111827;color:#fff;display:none;z-index:40;cursor:pointer}
.backtop.show{display:block}

.brand-main{display:flex;align-items:center;justify-content:space-between;gap:10px}
.filter-collapse{height:30px;border:1px solid var(--line);border-radius:999px;background:#fff;padding:0 10px;cursor:pointer;font-size:12px;color:#344054;white-space:nowrap}
.filter-collapse:hover{background:#f8fafc}
/* 折叠修正：桌面端 Chrome 下不能只隐藏筛选区，否则外层网格会留下空白区域。
   折叠时改为单行 flex 布局，并同步压缩 topbar 高度。 */
.topbar.collapsed .top-inner{
  display:flex!important;
  align-items:center!important;
  justify-content:space-between!important;
  grid-template-columns:none!important;
  padding:7px 18px!important;
  min-height:44px!important;
}
.topbar.collapsed .filters{
  display:none!important;
  height:0!important;
  max-height:0!important;
  overflow:hidden!important;
  padding:0!important;
  margin:0!important;
}
.topbar.collapsed .brand{font-size:16px;line-height:1.2}
.topbar.collapsed .brand small{display:none!important}
.topbar.collapsed .brand-main{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar.collapsed .filter-collapse{height:28px;display:inline-flex;align-items:center}
.topbar.collapsed + .layout .sidebar{top:58px;height:calc(100vh - 76px)}
@media(max-width:700px){.top-inner{padding:8px 10px}.brand{font-size:15px}.brand small{font-size:11px}.filter-collapse{display:inline-flex;align-items:center}.topbar:not(.collapsed) .filters{max-height:56vh;overflow:auto;padding-bottom:4px}.layout{padding:8px}.group-title{font-size:17px}.metric-grid{grid-template-columns:1fr 1fr}.group-nav{grid-template-columns:1fr}.school-title{font-size:20px}.sidebar{max-height:280px}}

@media(max-width:1100px){.top-inner{grid-template-columns:1fr}.filters{grid-template-columns:repeat(2,minmax(120px,1fr))}.layout{grid-template-columns:1fr}.sidebar{position:static;height:auto;max-height:360px}.kpis{grid-template-columns:repeat(2,1fr)}.metric-grid{grid-template-columns:repeat(2,1fr)}.evo-grid{grid-template-columns:1fr}.evo-mid{min-height:auto}}
@media print{.topbar,.sidebar,.actions,.backtop,.group-nav,.btn{display:none!important}.layout{display:block;padding:0}.school-view{border:0}.group-card{break-inside:avoid}}

/* 严格班型属性核对版：计划变化高亮 */
.plan-pill{display:inline-flex;align-items:center;border-radius:999px;padding:2px 8px;font-size:12px;font-weight:800;border:1px solid var(--line);white-space:nowrap}
.plan-up-big{background:#ecfdf3;border-color:#75e0a7;color:#05603a}
.plan-down-big{background:#fff1f0;border-color:#fecdca;color:#b42318}
.plan-up{background:#f0fdf4;border-color:#bbf7d0;color:#067647}
.plan-down{background:#fff7ed;border-color:#fed7aa;color:#b54708}
.plan-flat{background:#f8fafc;border-color:#d9dde3;color:#344054}
.plan-unknown{background:#fff7ed;border-color:#fed7aa;color:#b54708}
.plan-cell{display:flex;flex-direction:column;gap:3px;min-width:96px}
.plan-cell .plan-pill{align-self:flex-start}
.audit-note{font-size:12px;color:#b54708;line-height:1.35}
.tag.audit{border-color:#fdba74;background:#fff7ed;color:#c2410c;font-weight:900}
.tag.plan{border-color:#75e0a7;background:#ecfdf3;color:#05603a;font-weight:900}
.delta-pos{color:#067647;font-weight:900}.delta-neg{color:#b42318;font-weight:900}


.detail-btn{height:28px;border-radius:999px;padding:0 10px;font-size:12px}
.major-click{cursor:pointer}
.major-click:hover{text-decoration:underline}
.detail-section{border:1px solid var(--line);border-radius:12px;margin:0 0 14px;background:#fff;overflow:hidden}
.detail-section h3{margin:0;padding:10px 12px;background:#f8fafc;border-bottom:1px solid var(--line);font-size:14px}
.detail-table{width:100%;min-width:0}
.detail-table th{width:180px;color:#475467;background:#fff;font-weight:700}
.detail-table td,.detail-table th{border-bottom:1px solid var(--line2);padding:8px 10px;vertical-align:top}
.detail-table tr:last-child td,.detail-table tr:last-child th{border-bottom:0}
.detail-lead{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.detail-pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:3px 8px;font-size:12px}



/* === 80%缩放后的高度补偿修复 ===
   目的：
   1. 修复左下角留白过多的问题；
   2. 让左侧栏在视觉上铺满更完整的高度；
   3. 保持 80% 整体缩放，不改变数据与交互逻辑。
*/
:root{
  --page-zoom:0.8;
}
body{
  zoom:var(--page-zoom);
  min-height:calc(100vh / var(--page-zoom));
}
.layout{
  min-height:calc(100vh / var(--page-zoom) - 32px);
}
.main{
  min-height:calc(100vh / var(--page-zoom) - 32px);
}
.sidebar{
  height:calc((100vh - 116px) / var(--page-zoom));
  min-height:calc((100vh - 116px) / var(--page-zoom));
  align-self:start;
}
.topbar.collapsed + .layout .sidebar{
  top:58px;
  height:calc((100vh - 76px) / var(--page-zoom));
  min-height:calc((100vh - 76px) / var(--page-zoom));
}

/* 非 Chrome 兜底 */
@supports not (zoom:1){
  body{
    transform:scale(var(--page-zoom));
    transform-origin:top center;
    width:calc(100% / var(--page-zoom));
    min-height:calc(100vh / var(--page-zoom));
  }
  .layout,.main{
    min-height:calc(100vh / var(--page-zoom) - 32px);
  }
  .sidebar{
    height:calc((100vh - 116px) / var(--page-zoom));
    min-height:calc((100vh - 116px) / var(--page-zoom));
  }
  .topbar.collapsed + .layout .sidebar{
    height:calc((100vh - 76px) / var(--page-zoom));
    min-height:calc((100vh - 76px) / var(--page-zoom));
  }
}



/* === V3 决策结构修正：新增院校沉底 + 特殊培养合并筛选 === */
.filters{
  grid-template-columns:repeat(11,minmax(96px,1fr));
}
#specialPathFilter{
  border-color:#d0d5dd;
}
#newSchoolFilter{
  border-color:#fed7aa;
  background:#fff7ed;
  color:#b54708;
  font-weight:700;
}
.school-section-title{
  padding:10px 9px 6px;
  margin-top:6px;
  font-size:12px;
  color:#475467;
  font-weight:900;
  letter-spacing:.04em;
  border-top:1px solid var(--line2);
}
.school-section-title:first-child{
  border-top:0;
  margin-top:0;
}
.school-item.new-school{
  background:#fffbf5;
}
.school-item.new-school:hover,
.school-item.new-school.active{
  background:#fff4e5;
}
.badge-new-school{
  display:inline-flex;

  border-radius:999px;

  content:" 新增";

  border-radius:999px;

.new-school-note{
  margin-top:8px;
  border:1px solid #fed7aa;
  background:#fff7ed;
  color:#93370d;

  padding:8px 10px;
  font-size:13px;
  line-height:1.5;
}
.pill.new-school{
  border-color:#fdba74;
  background:#fff7ed;
  color:#b54708;
  font-weight:900;
}


/* === V4 修正：严格新增院校 + 省份多选大框 + 学校层级防误判 === */
.province-multi-wrap{position:relative;min-width:128px}
.multi-btn{height:36px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px;color:#111827;width:100%;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;white-space:nowrap}
.multi-btn::after{content:"▾";font-size:12px;color:#667085}
.multi-panel{position:fixed;left:50%;top:92px;transform:translateX(-50%);z-index:80;width:min(760px,calc(100vw - 36px));max-height:70vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 20px 48px rgba(16,24,40,.20);display:none;padding:14px}
.multi-panel.open{display:block}
.multi-head{display:flex;justify-content:space-between;gap:12px;align-items:center;border-bottom:1px solid var(--line2);padding-bottom:10px;margin-bottom:10px}
.multi-title{font-weight:900;font-size:16px}
.multi-actions{display:flex;gap:8px;flex-wrap:wrap}
.multi-action{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 10px;cursor:pointer;font-size:12px}
.multi-action.primary{background:#111827;color:#fff;border-color:#111827}
.province-grid{display:grid;grid-template-columns:repeat(6,minmax(86px,1fr));gap:8px}
.province-check{border:1px solid var(--line2);border-radius:10px;padding:8px 9px;background:#fbfcfd;display:flex;gap:6px;align-items:center;cursor:pointer}
.province-check:hover{background:#f2f7f4}.province-check input{width:14px;height:14px}
.region-row{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
