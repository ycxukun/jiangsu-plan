<style>

-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:18px}.metric{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.metric b{display:block;font-size:22px;letter-spacing:-.02em}.metric span{display:block;margin-top:5px;color:var(--muted);font-size:12px}.group-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px}.group-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:0 8px 26px rgba(11,42,26,.05)}.group-card:hover{border-color:#b7dfc6}.group-card h3{font-size:15px;margin:0 0 10px}.group-card .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mini{background:#f7faf8;border-radius:12px;padding:8px}.mini b{display:block}.mini span{font-size:11px;color:var(--muted)}.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.tag{font-size:11px;border-radius:999px;background:#eff6ff;color:#2453a6;padding:4px 8px}.tag.red{background:#fff0ee;color:#b42318}.tag.green{background:#f0fbf4;color:#0a7c42}.note-badge{font-size:11px;border-radius:999px;background:#fff7ed;color:#9a3412;padding:4px 8px;border:1px solid #fed7aa}.group-section{background:#fff;border:1px solid var(--line);border-radius:24px;margin-bottom:16px;overflow:hidden;box-shadow:0 8px 26px rgba(11,42,26,.05)}.group-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.group-head h3{margin:0;font-size:18px}.group-head p{margin:8px 0 0;color:var(--muted);font-size:13px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:980px}th,td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}th{position:sticky;top:0;background:#fbfdfc;color:#526058;font-size:12px;z-index:2}tr:hover td{background:#fbfffc}.clickable-row{cursor:pointer}.clickable-row .major-name{color:var(--green)}.major-name{font-weight:700}.risk-row td{background:var( ar(--line)}.modal-body{padding:18px 20px}.kv{display:grid;grid-template-columns:130px 1fr;gap:8px 14px;margin-bottom:12px}.kv dt{color:var(--muted)}.kv dd{margin:0}.note-panel{position:fixed;right:24px;top:148px;width:330px;z-index:40;background:#fff;border:1px solid #fed7aa;border-radius:18px;box-shadow:var(--shadow);display:none}.note-panel.open{display:block}.note-panel h4{margin:0;padding:12px 14px;border-bottom:1px solid #fed7aa;color:#9a3412}.note-panel div{padding:12px 14px;white-space:pre-wrap;color:#4b3423;font-size:13px;line-height:1.6}.admin-dock{position:fixed;left:22px;bottom:22px;z-index:60;display:none}.admin-page .admin-dock{display:block}.admin-dock button{background:var(--ink);color:#fff;border:0;border-radius:999px;padding:12px 16px;box-shadow:0 12px 32px rgba(0,0,0,.18);font-weight:800}.admin-menu{position:fixed;left:22px;bottom:76px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:8px;display:none;z-index:61}.admin-menu.open{display:block}.admin-menu button{display:block;width:180px;text-align:left;border:0;background:#fff;border-radius:12px;padding:10px 12px}.admin-menu button:hover{background:#f3f6f4}.edit-area textarea{width:100%;min-height:180px;border:1px solid var(--line);border-radius:14px;padding:12px;line-height:1.6}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}.modal-actions button{border:1px solid var(--line);border-radius:12px;padding:9px 13px;background:#fff;font-weight:700}.modal-actions .save{background:var(--green);color:#fff;border-color:var(--green)}.modal-actions .delete{color:var(--red)}.context-hint{color:var(--muted);font-size:12px;margin-top:10px}.footer{padding:22px 24px 36px;color:var(--muted);font-size:12px;text-align:center}@media(max-width:1100px){.filters{grid-template-columns:repeat(3,1fr)}.filters input{grid-column:span 3}.layout{grid-template-columns:1fr}.sidebar{position:relative;top:0;height:auto;max-height:360px}.summary-grid{grid-t /* V1.1.4 compact display mode */
body.compact-mode{--shadow:0 8px 22px rgba(11,42,26,.06)}
body.compact-mode .hero{padding:10px 18px 6px}
body.compact-mode .brand h1{font-size:18px}
body.compact-mode .brand p{font-size:12px;margin-top:4px;line-height:1.35}
body.compact-mode .version{padding:6px 10px;font-size:11px}
body.compact-mode .header-toggle{height:30px;padding:0 10px;font-size:11px}
body.compact-mode .filters{grid-template-columns:repeat(8,minmax(96px,1fr));gap:7px;padding:7px 18px 10px}
body.compact-mode .filters select,
body.compact-mode .filters input,
body.compact-mode .filters button{height:32px;border-radius:10px;padding:0 10px;font-size:13px}
body.compact-mode .layout{grid-template-columns:270px 1fr;gap:12px;padding:12px 18px}
body.compact-mode .sidebar{top:126px;height:calc(100vh - 146px);border-radius:18px}
body.compact-mode.header-collapsed .sidebar{top:64px;height:calc(100vh - 82px)}
body.compact-mode .side-head{padding:12px 14px}
body.compact-mode .school-list{padding:6px}
body.compact-mode .school-item{padding:9px 10px;border-radius:13px;margin-bottom:4px}
body.compact-mode .school-item .name{font-size:13px}
body.compact-mode .school-item .meta{margin-top:5px;font-size:11px;gap:6px}
body.compact-mode .score-pill{margin-top:6px;padding:3px 7px;font-size:11px}
body.compact-mode .school-header{border-radius:20px;padding:16px 18px;margin-bottom:10px}
body.compact-mode .school-title h2{font-size:23px}
body.compact-mode .badges{gap:6px;margin-top:10px}
body.compact-mode .badge{padding:4px 8px;font-size:11px}
body.compact-mode .summary-grid{gap:8px;margin-top:12px}
body.compact-mode .metric{border-radius:14px;padding:10px 12px}
body.compact-mode .metric b{font-size:19px}
body.compact-mode .metric span{font-size:11px;margin-top:3px}
body.compact-mode .group-cards{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;margin-bottom:10px}
body.compact-mode .group-card{border-radius:16px;padding:10px}
body.compact-mode .group-card h3{font-size:13px;margin-bottom:7px}
body.compact-mode .group-card .grid{gap:6px}
body.compact-mode .mini{border-radius:10px;padding:6px}
body.compact-mode .mini span{font-size:10px}
body.compact-mode .tag-row{gap:5px;margin-top:7px}
body.compact-mode .tag{font-size:10px;padding:3px 6px}
body.compact-mode .group-section{border-radius:18px;margin-bottom:10px}
body.compact-mode .group-head{padding:11px 14px}
body.compact-mode .group-head h3{font-size:16px}
body.compact-mode .group-head p{font-size:12px;margin-top:5px}
body.compact-mode th,
body.compact-mode td{padding:7px 9px;font-size:12px}
body.compact-mode th{font-size:11px}
body.compact-mode table{min-width:860px}
body.compact-mode .risk-label,
body.compact-mode .note-badge{font-size:10px;padding:3px 6px}
body.compact-mode .panel{width:min(500px,90vw)}
body.compact-mode .panel-head{padding:14px 18px}
body.compact-mode .panel-body{padding:14px 18px}
body.compact-mode .class-grid{gap:6px}
body.compact-mode .class-chip{padding:6px 9px;font-size:12px}
body.compact-mode .modal{border-radius:20px}
body.compact-mode .modal h3{padding:14px 18px}
body.compact-mode .modal-body{padding:14px 18px}
@media(max-width:1100px){
  body.compact-mode .filters{grid-template-columns:repeat(3,1fr)}
  body.compact-mode .filters input{grid-column:span 3}
  body.compact-mode .layout{grid-template-columns:1fr}
}


/* V1.1.5 back-to-top */
.back-top{position:fixed;right:26px;bottom:26px;z-index:58;border:1px solid #cfe6d8;background:#fff;color:var(--green);border-radius:999px;padding:10px 14px;font-weight:900;box-shadow:0 12px 32px rgba(11,42,26,.12)}
.back-top:hover{background:#f0faf4;border-color:#9fd8b7}
body.compact-mode .back-top{right:18px;bottom:18px;padding:8px 12px;font-size:12px}


/* V1.1.6 requirement filter */
body.compact-mode .filters{grid-template-columns:repeat(9,minmax(88px,1fr))}
@media(max-width:1280px){
  body.compact-mode .filters{grid-template-columns:repeat(5,1fr)}
  body.compact-mode .filters input{grid-column:span 2}
}


/* V1.1.7 giscus annotation drawer */
.anno-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.anno-btn,.anno-mini{border:1px solid #cfe6d8;background:#fff;color:var(--green);border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900}
.anno-btn.primary{background:#f0faf4;border-color:#9fd8b7}
.anno-mini{margin-left:8px;padding:3px 7px;font-size:10px;vertical-align:middle}
.anno-btn:hover,.anno-mini:hover{background:#eaf7ef}
.annotation-drawer{position:fixed;right:0;top:0;width:min(620px,94vw);height:100vh;z-index:82;background:#fff;border-left:1px solid var(--line);box-shadow:-20px 0 70px rgba(0,0,0,.16);transform:translateX(105%);transition:.22s ease;display:flex;flex-direction:column}
.annotation-drawer.open{transform:translateX(0)}
.annotation-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.annotation-head h3{margin:0;font-size:20px}
.annotation-head p{margin:7px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
.annotation-body{padding:16px 20px;overflow:auto}
.annotation-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.annotation-actions button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 12px;font-weight:800}
.annotation-template{white-space:pre-wrap;background:#f7faf8;border:1px solid var(--line);border-radius:16px;padding:12px;font-size:12px;line-height:1.55;color:#34443a;max-height:260px;overflow:auto}
.giscus-mount{margin-top:14px;min-height:260px}
.giscus-config-tip{border:1px dashed #b7dfc6;background:#fbfffc;border-radius:18px;padding:16px;line-height:1.7;color:#34443a}
.giscus-config-tip h4{margin:0 0 8px}
.giscus-config-tip code{display:block;white-space:pre-wrap;background:#f1f5f3;border-radius:10px;padding:8px;margin:8px 0;font-size:12px}
body.compact-mode .anno-actions{margin-top:7px}
body.compact-mode .anno-btn{padding:4px 8px;font-size:10px}
body.compact-mode .annotation-head{padding:14px 18px}
body.compact-mode .annotation-body{padding:12px 18px}
body.compact-mode .annotation-template{max-height:210px;font-size:11px}
@media(max-width:640px){.annotation-drawer{width:100vw}.anno-actions{gap:5px}.anno-btn{font-size:10px}}
